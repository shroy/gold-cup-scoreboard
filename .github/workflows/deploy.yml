name: Build and deploy scoreboards

on:
  push:
    branches: [main]
  workflow_dispatch:   # the "update now" button — always fetches live + deploys
  # No `schedule:` cron right now — there is no live (non-archived) tournament
  # to refresh. When the next tournament goes live, re-add a schedule like:
  #   schedule:
  #     - cron: "*/10 15-23 * * 6,0"   # ~8 AM–4 PM Pacific, Sat & Sun (UTC, no DST)
  # The per-tournament date window in meta.yml — not the cron — scopes refreshes.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      proceed: ${{ steps.fetch.outputs.proceed }}
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"

      # Date-gates and fetches per tournament (see fetch.rb). Archived
      # tournaments are never touched; only live ones inside their window
      # refresh. On a scheduled run with no open window, proceed=false.
      - name: Fetch live tournament data
        id: fetch
        env:
          EVENT_NAME: ${{ github.event_name }}
          TZ: America/Los_Angeles
        run: ruby fetch.rb

      - name: Build site
        if: steps.fetch.outputs.proceed == 'true'
        run: ruby build.rb

      - name: Upload Pages artifact
        if: steps.fetch.outputs.proceed == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    if: needs.build.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
